        const STORAGE_KEY = 'vocab_words';
        const messageEl = document.getElementById('message');
        const importBtn = document.getElementById('import-btn');

        function showMessage(text, isError) {
            messageEl.textContent = text;
            messageEl.className = 'message ' + (isError ? 'error' : 'success');
            messageEl.style.display = 'block';
        }

        importBtn.addEventListener('click', function () {
            try {
                const existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                const existingIds = new Set(existing.map(w => w.id));
                let added = 0;
                let skipped = 0;

                BATCH_DATA.forEach(word => {
                    if (existingIds.has(word.id)) {
                        skipped++;
                    } else {
                        existing.push(word);
                        existingIds.add(word.id);
                        added++;
                    }
                });

                localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));

                showMessage(
                    `第 3 天导入成功！新增 ${added} 个单词，跳过 ${skipped} 个重复。`,
                    false
                );

                const details = document.createElement('div');
                details.className = 'details';
                details.innerHTML = `
                    现在可以 <a href="index.html">打开词汇随记</a> 查看。<br>
                    当前本地共有 ${existing.length} 个单词。
                `;
                messageEl.appendChild(details);
            } catch (err) {
                showMessage('导入失败：' + err.message, true);
            }
        });
    </script>
