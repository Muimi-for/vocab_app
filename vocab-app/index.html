<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>词汇随记</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="search.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>
    <div class="app">
        <header>
            <h1>词汇随记</h1>
            <p>个人英语词汇记忆工具</p>
        </header>

        <!-- 今日复习入口 -->
        <section class="card review-section">
            <h2>今日复习</h2>
            <p>今天有 <strong id="review-count">0</strong> 个单词待复习。</p>
            <div class="review-links">
                <a href="review.html" class="review-btn">词义复习</a>
                <a href="review-phrases.html" class="review-btn secondary">词组复习</a>
                <a href="network.html" class="review-btn network">词汇星图</a>
            </div>
        </section>

        <!-- 添加 / 编辑表单 -->
        <section class="card form-section">
            <h2 id="form-title">添加新单词</h2>
            <form id="word-form">
                <input type="hidden" id="edit-id">

                <div class="form-row">
                    <label for="word">单词 <span class="required">*</span></label>
                    <input type="text" id="word" placeholder="例如：abandon" required>
                </div>

                <div class="form-row">
                    <label for="meaning">中文释义 <span class="required">*</span></label>
                    <input type="text" id="meaning" placeholder="例如：放弃，抛弃" required>
                </div>

                <div class="form-row">
                    <label for="phrases">词组 / 短语（每行一个，重点短语前加 *）</label>
                    <textarea id="phrases" rows="3" placeholder="例如：&#10;*abandon oneself to&#10;with abandon"></textarea>
                </div>

                <div class="form-row">
                    <label for="examples">例句</label>
                    <textarea id="examples" rows="2" placeholder="每行一个例句"></textarea>
                </div>

                <div class="form-row">
                    <label for="notes">备注</label>
                    <textarea id="notes" rows="2" placeholder="易错点、记忆技巧等"></textarea>
                </div>

                <div class="form-row">
                    <label>关联词（用于词汇星图，每项用逗号分隔）</label>
                    <div class="relations-grid">
                        <input type="text" id="rel-synonyms" placeholder="近义词">
                        <input type="text" id="rel-antonyms" placeholder="反义词">
                        <input type="text" id="rel-derivatives" placeholder="派生词">
                        <input type="text" id="rel-confusable" placeholder="易混词">
                        <input type="text" id="rel-roots" placeholder="同根 / 同源">
                    </div>
                </div>

                <div class="form-row inline">
                    <input type="checkbox" id="is-important">
                    <label for="is-important">标记为重点单词</label>
                </div>

                <div class="form-actions">
                    <button type="submit" id="submit-btn">保存</button>
                    <button type="button" id="cancel-btn" class="secondary" hidden>取消编辑</button>
                </div>
            </form>
        </section>

        <!-- 快速检索 -->
        <section class="card search-section">
            <div class="search-box">
                <input type="text" id="quick-search" placeholder="搜索单词、释义、词组、例句、备注…" autocomplete="off">
                <a href="search.html" class="search-advanced">高级检索 →</a>
            </div>
            <p class="search-tip">输入即搜，支持多关键词空格分隔</p>
        </section>

        <!-- 数据备份 -->
        <section class="card backup-section">
            <h2>数据备份</h2>
            <p class="backup-info">本地已存储 <strong id="backup-count">0</strong> 个单词 · <span id="backup-size">-</span></p>
            <div class="backup-actions">
                <button type="button" id="export-btn" class="review-btn secondary">导出备份</button>
                <label class="import-label">
                    <input type="file" id="import-btn" accept=".json,application/json" hidden>
                    <span class="review-btn">恢复备份</span>
                </label>
            </div>
            <p class="search-tip">导出会把所有单词保存为 JSON 文件；恢复可选择合并或覆盖现有数据</p>
            <div id="backup-message" class="backup-message" style="display: none;"></div>
        </section>

        <!-- 筛选与统计 -->
        <section class="toolbar">
            <div class="filter">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="important">重点</button>
                <button class="filter-btn" data-filter="normal">非重点</button>
            </div>
            <div class="stats">
                共 <strong id="total-count">0</strong> 个单词
            </div>
        </section>

        <!-- 单词列表 -->
        <section class="word-list" id="word-list">
            <!-- 单词卡片会由 JS 动态插入 -->
        </section>
    </div>

    <script src="search.js"></script>
    <script src="app.js"></script>
    <script src="/register-sw.js"></script>
</body>
</html>
