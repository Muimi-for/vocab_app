<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>词汇随记 - 高级检索</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="search.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div class="app">
        <header>
            <h1>高级检索</h1>
            <p>在全部词汇中快速定位单词、释义、词组与关联</p>
        </header>

        <section class="card search-panel">
            <div class="search-input-wrap">
                <input type="text" id="search-query" placeholder="输入单词、中文释义、词组、例句、备注或关联词…" autocomplete="off" autofocus>
                <button id="search-btn" class="search-btn">搜索</button>
            </div>

            <div class="search-options">
                <label class="search-option">
                    <input type="checkbox" id="search-important-only">
                    仅搜索重点词
                </label>
                <span class="search-hint">支持多关键词空格分隔，结果按相关度排序</span>
            </div>
        </section>

        <section class="search-stats">
            找到 <strong id="result-count">0</strong> 个结果
        </section>

        <section id="search-results" class="word-list">
            <div class="empty-tip">输入关键词开始检索</div>
        </section>

        <div class="back-link">
            <a href="index.html">← 返回首页</a>
        </div>
    </div>

    <script src="search.js"></script>
    <script src="search-page.js"></script>
    <script src="register-sw.js"></script>
</body>
</html>
