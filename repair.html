<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>词汇随记 - 数据修复</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .repair-section { text-align: center; }
        .repair-section p { color: var(--text-secondary); font-size: 0.95rem; }
        .repair-log {
            margin-top: 16px;
            text-align: left;
            font-size: 0.9rem;
            max-height: 300px;
            overflow-y: auto;
            background: #f9fafb;
            border-radius: 8px;
            padding: 12px;
        }
        .repair-log li { margin-bottom: 6px; }
        .success { color: #059669; }
        .skip { color: #6b7280; }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div class="app">
        <header>
            <h1>数据修复</h1>
            <p>从导入数据源恢复因编辑而丢失的关联词</p>
        </header>

        <section class="card repair-section">
            <p>此工具会从 <code>data/words-batch-*.json</code> 读取原始关联词数据，<br>仅对本地已丢失关联词（relations 为空或不存在）的单词进行修复，<br>不会改动你修改过的释义、词组、例句、备注等其他内容。</p>
            <button id="repair-btn" class="review-btn" style="margin-top: 12px;">开始修复</button>
            <div class="back-link">
                <a href="index.html">← 返回首页</a>
            </div>
        </section>

        <section id="repair-log" class="repair-log" style="display: none;"></section>
    </div>

    <script>
        const STORAGE_KEY = 'vocab_words';
        const BATCH_FILES = [
            'data/words-batch-01.json',
            'data/words-batch-02.json',
            'data/words-batch-03.json',
            'data/words-batch-04.json',
            'data/words-batch-05.json',
            'data/words-batch-06.json',
            'data/words-batch-07.json',
            'data/words-batch-08.json',
            'data/words-batch-09.json'
        ];

        function loadWords() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveWords(words) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
        }

        function hasRelations(relations) {
            if (!relations) return false;
            return Object.values(relations).some(arr => Array.isArray(arr) && arr.length > 0);
        }

        document.getElementById('repair-btn').addEventListener('click', async function () {
            const logEl = document.getElementById('repair-log');
            logEl.style.display = 'block';
            logEl.innerHTML = '<p>正在读取数据源…</p>';

            try {
                const batchArrays = await Promise.all(
                    BATCH_FILES.map(f => fetch(f).then(r => r.json()))
                );
                const sourceWords = batchArrays.flat();
                const sourceMap = new Map(sourceWords.map(w => [w.id, w]));

                const words = loadWords();
                let repaired = 0;
                let skipped = 0;
                const details = [];

                words.forEach(w => {
                    const source = sourceMap.get(w.id);
                    if (!source) {
                        skipped++;
                        return;
                    }

                    if (hasRelations(w.relations)) {
                        skipped++;
                        return;
                    }

                    if (hasRelations(source.relations)) {
                        w.relations = source.relations;
                        repaired++;
                        details.push(`<li class="success">✓ ${w.word}：已恢复关联词</li>`);
                    } else {
                        skipped++;
                    }
                });

                saveWords(words);

                logEl.innerHTML = `
                    <p><strong>修复完成</strong></p>
                    <ul>
                        <li class="success">已修复 ${repaired} 个单词</li>
                        <li class="skip">跳过 ${skipped} 个单词（已有关联词或数据源中无此词）</li>
                    </ul>
                    ${details.length > 0 ? '<ul>' + details.join('') + '</ul>' : ''}
                    <p style="margin-top: 10px;">现在可以 <a href="network.html">打开词汇星图</a> 查看修复后的关联。</p>
                `;
            } catch (err) {
                logEl.innerHTML = `<p style="color: #dc2626;">修复失败：${err.message}</p>`;
            }
        });
    </script>
    <script src="register-sw.js"></script>
</body>
</html>
